services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./h5:/usr/share/nginx/h5:ro
      - uploads_data:/usr/share/nginx/uploads:ro
    depends_on:
      - api
    restart: always

  api:
    build: ./server
    restart: always
    volumes:
      - uploads_data:/app/web/uploads
    environment:
      SERVER_PORT: "8080"
      DB_DSN: "root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/inventory?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      # ADMIN_USER / ADMIN_PASS 仅首次启动时用于创建初始管理员，后续不再使用
      # 管理员已存在时不会重置密码，请通过管理后台修改
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: inventory
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  mysql_data:
  uploads_data:
