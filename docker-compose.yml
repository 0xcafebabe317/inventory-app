services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./h5:/usr/share/nginx/h5:ro
      - uploads_data:/usr/share/nginx/uploads:ro
    depends_on:
      - api
    restart: always

  api:
    build: ./server
    restart: always
    volumes:
      - uploads_data:/app/web/uploads
    environment:
      SERVER_PORT: "8080"
      ENV: "production"
      DB_DSN: "root:${MYSQL_ROOT_PASSWORD}@tcp(mysql:3306)/inventory?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_PASS: "${REDIS_PASS:-redis-secret-change-me}"
      JWT_SECRET: "${JWT_SECRET}"
      WECHAT_APPID: "${WECHAT_APPID}"
      WECHAT_SECRET: "${WECHAT_SECRET}"
      # 管理员账号（仅首次启动无管理员时自动创建）
      # 已存在管理员则忽略，不会重置密码
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASS: "${ADMIN_PASS:-admin123}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: inventory
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASS:-redis-secret-change-me}
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  mysql_data:
  uploads_data:
