events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # 限流
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;

    # ═══════════════════════════════════
    # HTTP（IP + 域名）— 浏览器/H5 访问
    # ═══════════════════════════════════
    server {
        listen 80;
        server_name tzjxc.online www.tzjxc.online 43.136.182.83;

        # Let's Encrypt 续期验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API
        location /api {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理员后台 API
        location /admin/api {
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理员后台
        location /admin {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # H5 用户端
        location /h5 {
            alias /usr/share/nginx/h5;
            try_files $uri $uri/ /h5/index.html;
            index index.html;
        }

        # 上传文件
        location /uploads {
            alias /usr/share/nginx/uploads;
        }

        # 根路径 → H5
        location = / {
            return 301 /h5/;
        }

        # 健康检查
        location /health {
            return 200 "ok";
        }
    }

    # ═══════════════════════════════════
    # HTTPS（域名）— 小程序 API 访问
    # ═══════════════════════════════════
    server {
        listen 443 ssl;
        http2 on;
        server_name tzjxc.online www.tzjxc.online;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API
        location /api {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理员后台 API
        location /admin/api {
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理员后台
        location /admin {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # H5 用户端
        location /h5 {
            alias /usr/share/nginx/h5;
            try_files $uri $uri/ /h5/index.html;
            index index.html;
        }

        # 上传文件
        location /uploads {
            alias /usr/share/nginx/uploads;
        }

        # 根路径 → H5
        location = / {
            return 301 /h5/;
        }

        # 健康检查
        location /health {
            return 200 "ok";
        }
    }

    # ═══════════════════════════════════
    # IP 兜底（任意 Host 头）
    # ═══════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        location /api {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/api {
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin {
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /h5 {
            alias /usr/share/nginx/h5;
            try_files $uri $uri/ /h5/index.html;
            index index.html;
        }

        location = / {
            return 301 /h5/;
        }

        location /uploads {
            alias /usr/share/nginx/uploads;
        }

        location /health {
            return 200 "ok";
        }
    }
}
