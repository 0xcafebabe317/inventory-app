events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # 限流
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;

    # ═══════════════════════════════════
    # HTTP — 域名访问
    # ═══════════════════════════════════
    server {
        listen 80;
        server_name tzjxc.online www.tzjxc.online;

        # Let's Encrypt 续期验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Admin API（最长的前缀优先匹配）
        location /admin/api {
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User API
        location /api {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理员 PC Web 端
        location /admin {
            alias /usr/share/nginx/admin;
            try_files $uri $uri/ /admin/index.html;
            index index.html;
        }

        # 管理员移动端 H5
        location /admin-mobile {
            alias /usr/share/nginx/admin-mobile;
            try_files $uri $uri/ /admin-mobile/index.html;
            index index.html;
        }

        # 上传文件
        location /uploads {
            alias /usr/share/nginx/uploads;
        }

        # 用户 H5 端 — 根路径
        location / {
            root /usr/share/nginx/h5;
            try_files $uri $uri/ /index.html;
            index index.html;
        }

        # 健康检查
        location /health {
            return 200 "ok";
        }
    }

    # ═══════════════════════════════════
    # HTTPS — 域名访问
    # ═══════════════════════════════════
    server {
        listen 443 ssl;
        http2 on;
        server_name tzjxc.online www.tzjxc.online;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Admin API
        location /admin/api {
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User API
        location /api {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理员 PC Web 端
        location /admin {
            alias /usr/share/nginx/admin;
            try_files $uri $uri/ /admin/index.html;
            index index.html;
        }

        # 管理员移动端 H5
        location /admin-mobile {
            alias /usr/share/nginx/admin-mobile;
            try_files $uri $uri/ /admin-mobile/index.html;
            index index.html;
        }

        # 上传文件
        location /uploads {
            alias /usr/share/nginx/uploads;
        }

        # 用户 H5 端 — 根路径
        location / {
            root /usr/share/nginx/h5;
            try_files $uri $uri/ /index.html;
            index index.html;
        }

        # 健康检查
        location /health {
            return 200 "ok";
        }
    }

    # ═══════════════════════════════════
    # IP / 未知 Host — 直接拒绝
    # ═══════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
